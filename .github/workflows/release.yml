# Creates a GitHub release archive when a semantic version tag is pushed.
name: Release

on:
  push:
    tags: ['v*']

permissions: read-all

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: grafana/plugin-actions/build-plugin@build-plugin/v1.2.0
        # Enable after Grafana approves the public plugin signature level:
        # with:
        #   policy_token: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
